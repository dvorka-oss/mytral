name: Distro Flatpak

# build the Flatpak bundle only for release pull requests:
#   - source (head) branch must be rel/<major.minor.patch>
#   - target (base) branch must be main
on:
  pull_request:
    branches: [main]

jobs:
  distro-flatpak:
    # cheap gate: only run for rel/* head branches targeting main
    if: startsWith(github.head_ref, 'rel/')
    runs-on: ubuntu-latest

    steps:
    - name: Validate release branch name
      run: |
        if [[ ! "${{ github.head_ref }}" =~ ^rel/[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Branch '${{ github.head_ref }}' is not a rel/<major.minor.patch> release branch."
          exit 1
        fi
        echo "Release branch '${{ github.head_ref }}' validated."

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install flatpak and flatpak-builder
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak flatpak-builder

    - name: Install freedesktop 24.08 runtime and SDK
      run: |
        flatpak remote-add --if-not-exists --user flathub \
            https://flathub.org/repo/flathub.flatpakrepo
        flatpak install --user -y flathub \
            org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

    - name: Build Flatpak bundle
      run: make distro-flatpak-build

    - name: Resolve flatpak path
      id: flatpak
      run: |
        BUNDLE=$(ls distro/flatpak/mytral-*.flatpak)
        echo "path=${BUNDLE}" >> "$GITHUB_OUTPUT"
        echo "name=$(basename "${BUNDLE}")" >> "$GITHUB_OUTPUT"

    - name: Upload flatpak artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.flatpak.outputs.name }}
        path: ${{ steps.flatpak.outputs.path }}
        if-no-files-found: error

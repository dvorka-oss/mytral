name: Distro Tarball

# build the upstream tarball only for release pull requests:
#   - source (head) branch must be rel/<major.minor.patch>
#   - target (base) branch must be main
on:
  pull_request:
    branches: [main]

jobs:
  distro-tarball:
    # cheap gate: only run for rel/* head branches targeting main
    if: startsWith(github.head_ref, 'rel/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - name: Validate release branch name
      run: |
        if [[ ! "${{ github.head_ref }}" =~ ^rel/[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Branch '${{ github.head_ref }}' is not a rel/<major.minor.patch> release branch."
          exit 1
        fi
        echo "Release branch '${{ github.head_ref }}' validated."

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync

    - name: Build upstream tarball
      run: uv run make distro-tarball

    - name: Resolve tarball path
      id: tarball
      run: |
        TARBALL=$(ls distro/mytral-*.tar.gz)
        echo "path=${TARBALL}" >> "$GITHUB_OUTPUT"
        echo "name=$(basename "${TARBALL}")" >> "$GITHUB_OUTPUT"

    - name: Upload tarball artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.tarball.outputs.name }}
        path: ${{ steps.tarball.outputs.path }}
        if-no-files-found: error

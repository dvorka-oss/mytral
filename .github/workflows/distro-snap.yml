name: Distro Snap

# build the Snap package only for release pull requests:
#   - source (head) branch must be rel/<major.minor.patch>
#   - target (base) branch must be main
on:
  pull_request:
    branches: [main]

jobs:
  distro-snap:
    # cheap gate: only run for rel/* head branches targeting main
    if: startsWith(github.head_ref, 'rel/')
    runs-on: ubuntu-latest

    steps:
    - name: Validate release branch name
      run: |
        if [[ ! "${{ github.head_ref }}" =~ ^rel/[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Branch '${{ github.head_ref }}' is not a rel/<major.minor.patch> release branch."
          exit 1
        fi
        echo "Release branch '${{ github.head_ref }}' validated."

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Snap package
      id: snapcraft
      uses: snapcore/action-build@v1

    - name: Resolve snap path
      id: snap
      run: |
        SNAP="${{ steps.snapcraft.outputs.snap }}"
        echo "path=${SNAP}" >> "$GITHUB_OUTPUT"
        echo "name=$(basename "${SNAP}")" >> "$GITHUB_OUTPUT"

    - name: Upload snap artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.snap.outputs.name }}
        path: ${{ steps.snap.outputs.path }}
        if-no-files-found: error

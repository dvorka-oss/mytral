# MyTraL Snap Package Configuration
#
# Build: make distro-snap-build
# Install: sudo snap install --dangerous --classic distro/snap/mytral_*.snap
# Run: mytral

name: mytral
version: '1.57.0'
title: MyTraL
summary: Sovereign athlete training log - train smarter, not harder
description: |
  MyTraL is a privacy-first personal sport training log designed to track your
  athletic activities, manage your gear, and analyze your fitness progress
  without relying on mandatory cloud subscriptions.

  Key Features:

  - Universal Activity Tracking: Record and analyze any sport, from running and
    cycling to weightlifting and hiking.
  - Smart Gear Management: Monitor usage statistics for shoes, bikes, and
    components to know exactly when to service or replace them.
  - Deep Training Insights: Analyze your training load, monitor fitness trends,
    track goals, and record personal records (PRs).
  - Holistic Health Tracking: Keep tabs on your weight, general health metrics,
    custom trails, and training outfits.
  - Seamless Importing: Bring your data with you. Supports FIT, GPX, TCX,
    Strava(R), Polar(R), and more.
  - 100% Local Storage: Your data stays on your machine. No mandatory accounts,
    no cloud tracking.

  Whether you're training for a marathon or keeping a daily active journal,
  MyTraL puts your data back in your hands.

grade: stable
confinement: strict
base: core24
license: AGPL-3.0
contact: martin.dvorak@mindforger.com
issues: https://github.com/dvorka-oss/mytral/issues
source-code: https://github.com/dvorka-oss/mytral
website: https://mytral.fitness

platforms:
  amd64:
  arm64:

environment:
  PYTHONHOME: $SNAP/usr
  PYTHONPATH: $SNAP/lib/python3.12/site-packages
  MYTRAL_INCARNATION: DESKTOP
  MYTRAL_USER_REGISTRATION: "true"
  MYTRAL_ENABLE_CACHE: "true"
  # strict-only wiring (removed by build-snap.sh --classic):
  # store data in the version-independent per-user common dir (no manual review)
  MYTRAL_DATA_DIR: $SNAP_USER_COMMON
  # strict cannot launch a host browser - open the UI via the desktop portal instead
  MYTRAL_DESKTOP_BROWSER: portal

apps:
  mytral:
    command: bin/mytral-strict
    desktop: meta/gui/mytral.desktop
    plugs:
      - network        # Strava / Concept2 / Polar / Google Sheets import
      - network-bind   # local Flask server binds 127.0.0.1:5151
      - desktop        # portal, fonts, themes, xdg-open shim (opens host browser)
      - desktop-legacy
      - wayland
      - x11            # fallback session
      - opengl
      - home           # import FIT/GPX/TCX from non-hidden $HOME paths (~/Downloads)

parts:
  mytral:
    plugin: python
    source: .
    build-packages:
      - python3-dev    # provides python3 interpreter + headers inside the LXD build container
    stage-packages:
      - python3-venv
      - curl
      - ca-certificates
    override-build: |
      mkdir -p "$SNAPCRAFT_PART_INSTALL/usr/bin" "$SNAPCRAFT_PART_INSTALL/usr/lib"
      cp /usr/bin/python3.12 "$SNAPCRAFT_PART_INSTALL/usr/bin/python3.12"
      # bundle Python stdlib from the build container so the snap is self-contained
      # and finds encodings/abc/site/etc. via PYTHONHOME=$SNAP/usr on any host
      cp -a /usr/lib/python3.12 "$SNAPCRAFT_PART_INSTALL/usr/lib/"
      rm -rf "$SNAPCRAFT_PART_INSTALL/usr/lib/python3.12/test"       # ~15 MB of stdlib unit tests
      rm -rf "$SNAPCRAFT_PART_INSTALL/usr/lib/python3.12/turtledemo"
      rm -rf "$SNAPCRAFT_PART_INSTALL/usr/lib/python3.12/idlelib"
      craftctl default
      pip install "flaskwebgui~=1.0.0" "psutil>=5.9,<6.0"
      mkdir -p "$SNAPCRAFT_PART_INSTALL/bin"
      # stage both launchers; the active one is selected by the apps.mytral command key
      # (bin/mytral-strict for strict, bin/mytral-wrapper for classic)
      cp "$SNAPCRAFT_PART_SRC/build/snap/mytral-strict" "$SNAPCRAFT_PART_INSTALL/bin/mytral-strict"
      cp "$SNAPCRAFT_PART_SRC/build/snap/mytral-wrapper" "$SNAPCRAFT_PART_INSTALL/bin/mytral-wrapper"
      chmod +x "$SNAPCRAFT_PART_INSTALL/bin/mytral-strict" "$SNAPCRAFT_PART_INSTALL/bin/mytral-wrapper"

  desktop-assets:
    plugin: dump
    source: snap/gui
    organize:
      mytral.desktop: meta/gui/mytral.desktop
      mytral.png: meta/gui/mytral.png
